<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Autonomia Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="hero-container">
        <div class="overlay"></div>
        <div class="content">
            <h1>Vamos começar?</h1>
            <p>Preencha os dados abaixo para personalizar sua experiência:</p>

            <form id="form-cadastro">
                <input type="text" id="nome" placeholder="Digite seu nome" required>
                <input type="number" id="idade" placeholder="Qual a sua idade?" min="1" max="120" required>

                <button type="submit" class="btn-iniciar">Confirmar</button>
            </form>
        </div>
    </main>

    <script type="module" src="cadastro.js"></script>
</body>
</html>
